<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 400px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    color: white;
}

h1 {
    text-align: center;
}

.input-box {
    display: flex;
    margin-bottom: 20px;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #00c6ff;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: rgba(255,255,255,0.15);
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.delete {
    background: crimson;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔥 Todo List</h1>

    <div class="input-box">
        <input id="title" placeholder="Enter task...">
        <button onclick="addTodo()">Add</button>
    </div>

    <ul id="list"></ul>
</div>

<script>
const API = "http://localhost:8080/api/todos";

async function loadTodos() {
    const res = await fetch(API);
    const data = await res.json();

    document.getElementById("list").innerHTML = data.map(todo => `
        <li>
            <span>${todo.title}</span>
            <button class="delete" onclick="deleteTodo(${todo.id})">X</button>
        </li>
    `).join("");
}

async function addTodo() {
    const input = document.getElementById("title");

    if (!input.value) return;

    await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            title: input.value,
            completed: false
        })
    });

    input.value = "";
    loadTodos();
}

async function deleteTodo(id) {
    await fetch(`${API}/${id}`, { method: "DELETE" });
    loadTodos();
}

loadTodos();
</script>

</body>
</html>
